version: '3.9'

services:

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasks-php
    volumes:
      - ./:/var/www/tasks
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: tasks-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/tasks
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: postgres:17-bookworm
    container_name: tasks-db
    restart: always
    environment:
      POSTGRES_PASSWORD: pass
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
